services:
  pzserver:
    build: .
    image: localhost/pzserver:latest
    container_name: pzserver
    restart: unless-stopped
    stop_grace_period: 60s
    ports:
      - "16261:16261/udp"
      - "16262:16262/udp"
      - "27015:27015/tcp"
    volumes:
      - pz-zomboid:/home/steam/Zomboid
      - pz-steamapps:/opt/pzserver/steamapps  
      - ./servertest.ini:/home/steam/Zomboid/Server/servertest.ini:ro,z
    # Resource priority — pzserver wins under contention.
    # cpu_shares is a relative weight (default 1024); only matters when CPU is
    # contested, no effect on an idle host. mem_reservation is the soft floor
    # the kernel protects under memory pressure. mem_limit is the hard cap;
    # tune to ~70% of host RAM minus the small caps below. oom_score_adj
    # biases the OOM killer away from this container.
    cpu_shares: 4096
    mem_reservation: 2g
    mem_limit: 4g
    oom_score_adj: -500

  pzsm:                                                                              
    build:                                                                           
      context: ../pzsm
      dockerfile: Dockerfile
    image: localhost/pzsm:latest                                                     
    container_name: pzsm
    restart: unless-stopped                                                          
    stop_grace_period: 10s                            
    depends_on:
      - pzserver                                                                     
    expose:
      - "8080"                                                                       
    volumes:                                          
      - ./pzsm/config.yaml:/etc/pzsm/config.yaml:ro,Z
      - ./pzsm.db:/var/lib/pzsm/pzsm.db:rw,Z
      - pzsm-data:/var/lib/pzsm
      - ./servertest.ini:/home/steam/Zomboid/Server/servertest.ini:rw,z  
    # Bind-mount the parent directory of servertest.ini so atomic temp+rename
    # writes inside pzsm work without crossing a mount boundary.
    cpu_shares: 256
    mem_limit: 256m
    oom_score_adj: 500

  pzsmui:                                                                            
    build:                                            
      context: ../pzsmui
      dockerfile: Dockerfile                                                         
    image: localhost/pzsmui:latest
    container_name: pzsmui                                                           
    restart: unless-stopped                           
    depends_on:
      - pzsm
    cpu_shares: 256
    mem_limit: 128m
    oom_score_adj: 500

volumes:
  pz-zomboid:
  pz-steamapps:
  pzsm-data:
